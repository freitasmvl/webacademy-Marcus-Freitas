name: Quinto Workflow

on:
  push:

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Exibir data e hora da execução
        run: date
      - name: Exibir versão do Git
        run: git --version

  job2:
    name: Validação de Organização Mínima
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Verificar se README.md existe
        run: test -f README.md 
      - name: Verificar se LICENSE existe
        run: test -f LICENSE
      - name: Verificar se .gitignore existe
        run: test -f .gitignore